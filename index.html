<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-strong: #c8c5bc;
    --text: #1a1916;
    --text-muted: #6b6860;
    --text-hint: #9e9b93;
    --green-bg: #eaf5ee;
    --green-text: #1a5c2e;
    --green-border: #a3d4b0;
    --red-bg: #fdf0ee;
    --red-text: #7a1f12;
    --red-border: #f0b8b0;
    --amber-bg: #fdf6e8;
    --amber-text: #7a4f0a;
    --amber-border: #e8d09a;
    --gray-bg: #f0efe9;
    --gray-text: #4a4845;
    --gray-border: #ccc9c0;
    --structured-accent: #2d8a56;
    --chaotic-accent: #c44a20;
    --absent-accent: #8a8680;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--text-hint);
    text-transform: uppercase;
    margin-bottom: .75rem;
  }

  h1 {
    font-size: 26px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: .75rem;
    color: var(--text);
  }

  .task-bar {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    margin-top: .5rem;
  }

  .task-bar .tag {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .06em;
    color: var(--text-hint);
    text-transform: uppercase;
  }

  .task-bar .task-text {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .dot-structured { background: var(--structured-accent); }
  .dot-chaotic { background: var(--chaotic-accent); }
  .dot-absent { background: var(--absent-accent); }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 500;
    font-family: var(--font-mono);
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: .07em;
  }

  tbody tr.data-row {
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }

  tbody tr.data-row:hover { background: var(--bg); }

  tbody tr.expand-row {
    border-bottom: 1px solid var(--border);
  }

  tbody tr.expand-row:last-child { border-bottom: none; }

  td {
    padding: 12px 14px;
    vertical-align: middle;
  }

  .model-name {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
  }

  .model-name a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid var(--border-strong);
    padding-bottom: 1px;
    transition: color .15s, border-color .15s;
  }

  .model-name a:hover {
    color: var(--structured-accent);
    border-color: var(--structured-accent);
  }

  .model-sub {
    font-size: 11px;
    color: var(--text-hint);
    font-family: var(--font-mono);
    margin-top: 3px;
  }

  .pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    font-family: var(--font-mono);
    border: 1px solid transparent;
  }

  .pill-yes { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .pill-no  { background: var(--red-bg);   color: var(--red-text);   border-color: var(--red-border); }
  .pill-structured { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .pill-chaotic    { background: var(--red-bg);   color: var(--red-text);   border-color: var(--red-border); }
  .pill-absent     { background: var(--gray-bg);  color: var(--gray-text);  border-color: var(--gray-border); }

  .iters-val {
    font-size: 16px;
    font-weight: 500;
    font-family: var(--font-mono);
    color: var(--text);
  }

  .verdict {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .btn-expand {
    border: 1px solid var(--border-strong);
    background: transparent;
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    letter-spacing: .02em;
  }

  .btn-expand:hover {
    background: var(--bg);
    color: var(--text);
  }

  .btn-expand.open {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .expand-cell {
    padding: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .expand-inner {
    overflow: hidden;
    max-height: 0;
    transition: max-height .35s ease, padding .25s ease;
    padding: 0 16px;
  }

  .expand-inner.open {
    max-height: 2000px;
    padding: 16px;
  }

  .iter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .iter-tab {
    border: 1px solid var(--border-strong);
    background: var(--surface);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }

  .iter-tab:hover { background: var(--bg); }

  .iter-tab.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .trace-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text);
    line-height: 1.75;
    white-space: pre-wrap;
    border-left: 3px solid transparent;
  }

  .trace-structured { border-left-color: var(--structured-accent); }
  .trace-chaotic    { border-left-color: var(--chaotic-accent); }
  .trace-absent     { border-left-color: var(--absent-accent); color: var(--text-muted); font-style: italic; }

  footer {
    margin-top: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .footer-note {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-hint);
  }

  .footer-link {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-hint);
    text-decoration: none;
    border-bottom: 1px solid var(--border-strong);
    padding-bottom: 1px;
    transition: color .15s;
  }

  .footer-link:hover { color: var(--text); }

  @media (max-width: 640px) {
    body { padding: 1.5rem 1rem; }
    h1 { font-size: 20px; }
    thead th:nth-child(4),
    td:nth-child(4) { display: none; }
  }
</style>
</head>

const STYLE_PILL = {
  structured: '<span class="pill pill-structured">estructurado</span>',
  chaotic:    '<span class="pill pill-chaotic">caótico</span>',
  absent:     '<span class="pill pill-absent">silencioso</span>'
};

function buildRows(row) {
  const tabsHTML = row.traces.map((t, i) =>
    `<button class="iter-tab${i===0?' active':''}" onclick="selectTab('${row.id}',${i})">${t.label}</button>`
  ).join('');

  const contentsHTML = row.traces.map((t, i) =>
    `<div id="tc-${row.id}-${i}" style="display:${i===0?'block':'none'}">
      <div class="trace-box trace-${row.style}">${t.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`
  ).join('');

  return `
    <tr class="data-row">
      <td><div class="model-name"><a href="${row.link}" target="_blank" rel="noopener noreferrer">${row.name}</a></div><div class="model-sub">${row.sub}</div></td>
      <td><span class="pill ${row.done?'pill-yes':'pill-no'}">${row.done?'completada':'incompleta'}</span></td>
      <td><div class="iters-val">${row.iters}</div></td>
      <td>${STYLE_PILL[row.style]}</td>
      <td class="verdict">${row.verdict}</td>
      <td><button class="btn-expand" id="btn-${row.id}" onclick="toggle('${row.id}')">ver razonamiento</button></td>
    </tr>
    <tr class="expand-row">
      <td colspan="6" class="expand-cell">
        <div class="expand-inner" id="inner-${row.id}">
          ${row.traces.length > 1 ? `<div class="iter-tabs">${tabsHTML}</div>` : ''}
          ${contentsHTML}
        </div>
      </td>
    </tr>`;
}

document.getElementById('tbody').innerHTML = ROWS.map(buildRows).join('');

function toggle(id) {
  const inner = document.getElementById('inner-' + id);
  const btn   = document.getElementById('btn-' + id);
  const open  = inner.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.textContent = open ? 'cerrar' : 'ver razonamiento';
}

function selectTab(modelId, idx) {
  const row = ROWS.find(r => r.id === modelId);
  row.traces.forEach((_, i) => {
    const el = document.getElementById(`tc-${modelId}-${i}`);
    if (el) el.style.display = i === idx ? 'block' : 'none';
  });
  document.querySelectorAll(`#inner-${modelId} .iter-tab`).forEach((tab, i) => {
    tab.classList.toggle('active', i === idx);
  });
}
</script>
